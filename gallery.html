<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="アップされた画像一覧">
    <title>画像一覧 - 似てる動物AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Background Stars -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Back Button -->
        <div class="back-btn-container">
            <a href="index.html" class="back-btn">← トップに戻る</a>
        </div>

        <!-- Main Card -->
        <div class="card gallery-card">
            <!-- Icon -->
            <div class="icon-container">
                <span class="icon">📸</span>
            </div>

            <!-- Title -->
            <h1 class="title">画像一覧</h1>
            <p class="subtitle">みんながアップロードした画像</p>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- Sample Gallery Items (Blurred) -->
                <div class="gallery-item">
                    <div class="gallery-image blurred">
                        <span class="animal-emoji">🐱</span>
                    </div>
                    <p class="gallery-animal">ねこ</p>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image blurred">
                        <span class="animal-emoji">🐶</span>
                    </div>
                    <p class="gallery-animal">いぬ</p>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image blurred">
                        <span class="animal-emoji">🦊</span>
                    </div>
                    <p class="gallery-animal">きつね</p>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image blurred">
                        <span class="animal-emoji">🐰</span>
                    </div>
                    <p class="gallery-animal">うさぎ</p>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image blurred">
                        <span class="animal-emoji">🐻</span>
                    </div>
                    <p class="gallery-animal">たぬき</p>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image blurred">
                        <span class="animal-emoji">🦔</span>
                    </div>
                    <p class="gallery-animal">ハリネズミ</p>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image blurred">
                        <span class="animal-emoji">🐹</span>
                    </div>
                    <p class="gallery-animal">ハムスター</p>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image blurred">
                        <span class="animal-emoji">🐼</span>
                    </div>
                    <p class="gallery-animal">パンダ</p>
                </div>
            </div>

            <!-- Note -->
            <div class="gallery-note">
                <p>※ プライバシー保護のため、画像はモザイク処理されています</p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
